# Weston's configuration for Tunix.
#
# Found through the XDG base directory spec: with no XDG_CONFIG_DIRS set,
# weston falls back to /etc/xdg and looks for weston/weston.ini there.
#
# The font settings are the reason this file exists. weston-terminal defaults
# to "monospace" at 14, and with fontconfig present that resolves through the
# generic aliases -- but naming the family directly is what makes the panel's
# launcher, started with no arguments, use it too.

[core]
# The DRM backend is selected by `startx` on the command line rather than here,
# so that a build with no usable display can still fall back to headless.
idle-time=0

[shell]
locking=false
panel-position=top

[terminal]
font=JetBrains Mono
font-size=14

[launcher]
icon=/usr/share/weston/icon_terminal.png
path=/usr/bin/weston-terminal
