# Weston's configuration for Tunix.
#
# Found through the XDG base directory spec: with no XDG_CONFIG_DIRS set,
# weston falls back to /etc/xdg and looks for weston/weston.ini there.
#
# The font settings are the reason this file exists. weston-terminal defaults
# to "monospace" at 14, and with fontconfig present that resolves through the
# generic aliases -- but naming the family directly is what makes the panel's
# launcher, started with no arguments, use it too.

[core]
# The DRM backend is selected by `startx` on the command line rather than here,
# so that a build with no usable display can still fall back to headless.
#
# pixman, and measurably so: on this machine GL is *slower*, not faster.
#
# The GL renderer works (softpipe over GBM/kms_swrast) but it does not save the
# copy it looks like it should. This driver has no CRTC to point at a buffer, so
# presenting is always a blit into the scanout -- that copy happens either way.
# GL therefore only swaps pixman's SIMD 2D compositing for a general 3D pipeline
# running on softpipe, a reference rasteriser with no SIMD and no JIT, and adds
# ~2.4 s of renderer setup on top.
#
# The lever that would change this is llvmpipe rather than softpipe, which needs
# LLVM cross-built against musl. Until then GL is worth asking for only when
# something needs it -- EGL clients rendering into shared buffers:
#
#   startx --renderer=gl
renderer=pixman
idle-time=0

[shell]
locking=false
panel-position=top

[terminal]
font=JetBrains Mono
font-size=14

[launcher]
icon=/usr/share/weston/icon_terminal.png
path=/usr/bin/weston-terminal

# weston's own demo. It is here because it is the cheapest moving thing on the
# system: pure toy toolkit, no new dependencies, and it makes it obvious at a
# glance whether the compositor is actually repainting.
[launcher]
icon=/usr/share/weston/icon_flower.png
path=/usr/bin/weston-flower

# GTK3. The widget factory is GTK's own kitchen-sink demo: if it runs, the
# whole stack under it -- glib, pango, gdk-pixbuf, atk, cairo, the wayland
# backend -- is alive. It renders with cairo into wl_shm buffers, so it works
# under the default pixman renderer; no GL involved.
[launcher]
icon=/usr/share/weston/icon_window.png
path=/usr/bin/gtk3-widget-factory

# Thunar, the Xfce file manager. Its own hicolor icon, and it browses the real
# filesystem through GIO. No session bus runs, so it launches standalone and
# falls back to built-in preferences (xfconf is unreachable); local file
# browsing works regardless.
[launcher]
icon=/usr/share/icons/hicolor/48x48/apps/org.xfce.thunar.png
path=/usr/bin/thunar
