name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image-and-boot:
    name: build-image-and-boot
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          # Submodules are fetched shallow when this is 1, which only brings the
          # default branch tip. Any submodule pinned to a release tag rather
          # than to the tip of master then fails to resolve, and Savannah does
          # not serve unadvertised objects, so the direct-SHA fallback fails
          # too. Full history keeps every pin reachable.
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            autopoint \
            binutils \
            bison \
            build-essential \
            ca-certificates \
            cmake \
            file \
            flex \
            gettext \
            git \
            gperf \
            libtool \
            make \
            nasm \
            pkg-config \
            python3 \
            python3-pil \
            qemu-system-x86 \
            tar \
            texinfo \
            xz-utils

      - name: Build disk image
        run: make all

      - name: Run host runtime checks
        run: |
          make dynamic-runtime-check
          make shared-image-codecs-check

      - name: Boot smoke test
        run: make qemu-ci

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tunix-ci-${{ github.sha }}
          path: |
            build/tunix.img
            build/kernel.elf
            build/initramfs.img
            build/qemu-ci.log
          if-no-files-found: warn
          retention-days: 14
